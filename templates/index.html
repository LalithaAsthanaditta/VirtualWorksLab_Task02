<!DOCTYPE html>
<html>
<head>
    <title>User Profile Card Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h1>User Profile Card Generator</h1>

    <form method="POST">
        <input
            type="text"
            name="name"
            placeholder="Full Name"
            required
        >

        <textarea
            name="bio"
            placeholder="Write a short bio..."
            required
        ></textarea>

        <input
            type="text"
            name="image"
            placeholder="Profile Image URL"
            required
        >

        <button type="submit">
            Generate Profile
        </button>
    </form>

</body>
</html>
